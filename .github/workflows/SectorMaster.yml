name: Build Sector Master

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-sector:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Build sector map
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import requests
          import time

          HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
              "Accept": "application/json, text/plain, */*",
              "Accept-Language": "en-US,en;q=0.9",
              "Referer": "https://www.nseindia.com/market-data/live-equity-market",
              "Connection": "keep-alive",
          }

          session = requests.Session()
          session.headers.update(HEADERS)

          def safe_get_json(url, retries=3):
              for attempt in range(retries):
                  try:
                      r = session.get(url, timeout=20)
                  except Exception as ex:
                      print(f"  attempt {attempt+1} request error: {ex}")
                      time.sleep(3)
                      continue

                  ctype = r.headers.get("Content-Type", "")
                  if r.status_code == 200 and "json" in ctype:
                      try:
                          return r.json()
                      except Exception as ex:
                          print(f"  attempt {attempt+1} json parse error: {ex}")
                  else:
                      print(f"  attempt {attempt+1} failed: status={r.status_code} ctype={ctype} body[:200]={r.text[:200]!r}")

                  # refresh cookies and retry
                  try:
                      session.get("https://www.nseindia.com", timeout=20)
                  except Exception:
                      pass
                  time.sleep(3)
              return None

          # warm up cookies
          session.get("https://www.nseindia.com", timeout=20)
          time.sleep(2)

          data = safe_get_json("https://www.nseindia.com/api/equity-stockIndices?index=NIFTY%20500")

          if data is None:
              print("FATAL: Could not fetch NIFTY 500 index data.")
              print("NSE most likely blocked this GitHub-hosted runner's IP (common for cloud/datacenter IPs).")
              print("Fix options: use a self-hosted runner, route via a proxy with an Indian residential IP,")
              print("or switch to a data source that allows cloud IPs.")
              raise SystemExit(1)

          stocks = data.get("data", [])

          sector_map = {}

          for stock in stocks:
              symbol = stock.get("symbol")

              if not symbol:
                  continue

              try:
                  info_data = safe_get_json(
                      f"https://www.nseindia.com/api/quote-equity?symbol={symbol}"
                  )

                  if info_data is None:
                      print(symbol, "-> no data, marking Unknown")
                      sector_map[symbol] = "Unknown"
                  else:
                      info = info_data.get("industryInfo", {})
                      sector_map[symbol] = info.get("sector") or "Unknown"
                      print(symbol)

                  time.sleep(1)

              except Exception as ex:
                  print(symbol, ex)
                  sector_map[symbol] = "Unknown"

          os.makedirs("stocks", exist_ok=True)

          with open(
              "stocks/sector_map.json",
              "w"
          ) as f:
              json.dump(
                  sector_map,
                  f,
                  indent=2
              )
          PYEOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add stocks/sector_map.json

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update sector map"
            git push
          fi

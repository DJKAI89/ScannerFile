name: Build Sector Master

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-sector:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Build sector map
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import requests
          import time

          HEADERS = {
              "User-Agent": "Mozilla/5.0",
              "Accept": "application/json",
              "Referer": "https://www.nseindia.com/"
          }

          session = requests.Session()

          session.get(
              "https://www.nseindia.com",
              headers=HEADERS,
              timeout=20
          )

          time.sleep(2)

          data = session.get(
              "https://www.nseindia.com/api/equity-stockIndices?index=NIFTY%20500",
              headers=HEADERS,
              timeout=20
          ).json()

          stocks = data.get("data", [])

          sector_map = {}

          for stock in stocks:
              symbol = stock.get("symbol")

              if not symbol:
                  continue

              try:
                  r = session.get(
                      f"https://www.nseindia.com/api/quote-equity?symbol={symbol}",
                      headers=HEADERS,
                      timeout=20
                  )

                  info = r.json().get("industryInfo", {})

                  sector_map[symbol] = (
                      info.get("sector")
                      or "Unknown"
                  )

                  print(symbol)

                  time.sleep(1)

              except Exception as ex:
                  print(symbol, ex)
                  sector_map[symbol] = "Unknown"

          os.makedirs("stocks", exist_ok=True)

          with open(
              "stocks/sector_map.json",
              "w"
          ) as f:
              json.dump(
                  sector_map,
                  f,
                  indent=2
              )
          PYEOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add stocks/sector_map.json

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update sector map"
            git push
          fi
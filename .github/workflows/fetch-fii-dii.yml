name: Fetch NSE FII/DII Data Daily

on:
  schedule:
    - cron: '30 14 * * 1-5'   # 8:00 PM IST (Mon–Fri)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch NSE FII/DII + F&O data
        run: |
          python3 << 'PYEOF'
          import requests, json, os, time
          from datetime import datetime

          HEADERS = {
            'User-Agent': 'Mozilla/5.0',
            'Accept': 'application/json, text/plain, */*',
            'Referer': 'https://www.nseindia.com/',
          }

          session = requests.Session()

          # -----------------------------
          # STEP 1: INIT SESSION
          # -----------------------------
          print("Step 1: Initialize NSE session...")
          session.get('https://www.nseindia.com', headers=HEADERS, timeout=15)
          time.sleep(3)

          # -----------------------------
          # STEP 2: CASH DATA
          # -----------------------------
          print("\nStep 2: Fetching CASH market data...")
          cash_resp = session.get('https://www.nseindia.com/api/fiidiiTradeReact', headers=HEADERS, timeout=15)
          cash_resp.raise_for_status()
          raw = cash_resp.json()

          result = {
            "date": "",
            "cash": {
              "FII": {"buy": 0, "sell": 0, "net": 0},
              "DII": {"buy": 0, "sell": 0, "net": 0}
            },
            "fetched_at": datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
          }

          for row in raw:
            cat = (row.get('category') or '').upper()

            if 'FII' in cat or 'FPI' in cat:
              result["cash"]["FII"] = {
                "buy": float(row.get('buyValue') or 0),
                "sell": float(row.get('sellValue') or 0),
                "net": float(row.get('netValue') or 0)
              }
              result["date"] = row.get('date') or ""

            elif 'DII' in cat:
              result["cash"]["DII"] = {
                "buy": float(row.get('buyValue') or 0),
                "sell": float(row.get('sellValue') or 0),
                "net": float(row.get('netValue') or 0)
              }

          print(f"CASH: {result['date']} | FII={result['cash']['FII']['net']} | DII={result['cash']['DII']['net']}")

          # -----------------------------
          # STEP 3: F&O DATA (FIXED)
          # -----------------------------
          print("\nStep 3: Fetching F&O data...")
          time.sleep(2)

          fno_resp = session.get('https://www.nseindia.com/api/fiiDerivativeTradeReact', headers=HEADERS, timeout=15)

          participants = {
            "FII": {},
            "DII": {},
            "PRO": {},
            "CLIENT": {}
          }

          def parse_participant(row):
              def gv(*keys):
                  for k in keys:
                      v = row.get(k)
                      if v not in (None,'',0,'0','-','--'):
                          try:
                              return float(str(v).replace(',','').replace(' ',''))
                          except:
                              pass
                  return 0.0

              data = {
                  "index_futures": {
                      "long": gv('futureIndexLong','indexFutLong'),
                      "short": gv('futureIndexShort','indexFutShort')
                  },
                  "stock_futures": {
                      "long": gv('futureStockLong','stockFutLong'),
                      "short": gv('futureStockShort','stockFutShort')
                  },
                  "index_options": {
                      "call_long": gv('optionIndexCallLong','idxCallLong'),
                      "call_short": gv('optionIndexCallShort','idxCallShort'),
                      "put_long": gv('optionIndexPutLong','idxPutLong'),
                      "put_short": gv('optionIndexPutShort','idxPutShort')
                  }
              }

              data["net"] = {
                  "index_futures": data["index_futures"]["long"] - data["index_futures"]["short"],
                  "stock_futures": data["stock_futures"]["long"] - data["stock_futures"]["short"],
                  "index_call": data["index_options"]["call_long"] - data["index_options"]["call_short"],
                  "index_put": data["index_options"]["put_long"] - data["index_options"]["put_short"]
              }

              return data

          if fno_resp.status_code == 200:
              fno_json = fno_resp.json()

              print("FNO RAW STRUCTURE:", list(fno_json.keys()) if isinstance(fno_json, dict) else "LIST")

              rows = []

              # 🔥 HANDLE ALL NSE FORMATS
              if isinstance(fno_json, dict):
                  if 'data' in fno_json and isinstance(fno_json['data'], list):
                      rows = fno_json['data']
                  else:
                      for key, val in fno_json.items():
                          if isinstance(val, list):
                              for item in val:
                                  if isinstance(item, dict):
                                      item['__type'] = key
                                      rows.append(item)

              elif isinstance(fno_json, list):
                  rows = fno_json

              print(f"Parsed rows count: {len(rows)}")

              for row in rows:
                  if not isinstance(row, dict):
                      continue

                  cat = (
                      str(row.get('clientType') or
                          row.get('category') or
                          row.get('participant') or
                          row.get('clienttype') or
                          row.get('__type') or '')
                  ).upper()

                  if 'FII' in cat or 'FPI' in cat or 'FOREIGN' in cat:
                      participants["FII"] = parse_participant(row)
                  elif 'DII' in cat:
                      participants["DII"] = parse_participant(row)
                  elif 'PRO' in cat:
                      participants["PRO"] = parse_participant(row)
                  elif 'CLIENT' in cat:
                      participants["CLIENT"] = parse_participant(row)

          else:
              print("FNO API FAILED:", fno_resp.status_code)

          result["fno"] = participants

          print("\nF&O Summary:")
          for k, v in participants.items():
              if v:
                  print(f"{k}: Index Fut Net = {v['net']['index_futures']}")
              else:
                  print(f"{k}: No data")

          # -----------------------------
          # SAVE FILE
          # -----------------------------
          os.makedirs('fii-dii', exist_ok=True)
          with open('fii-dii/latest.json', 'w') as f:
              json.dump(result, f, indent=2)

          print("\nSaved to fii-dii/latest.json")
          PYEOF

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fii-dii/latest.json
          git diff --staged --quiet || git commit -m "Auto-update: NSE FII/DII data $(date +'%d %b %Y')"
          git push
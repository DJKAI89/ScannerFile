name: Fetch NIFTY 500 Stock Master (Weekly + F&O Bulletproof)

on:
  schedule:
    - cron: '0 15 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-stocks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Fetch Stocks + F&O (Bulletproof)
        run: |
          python3 << 'PYEOF'
          import requests, json, time, os, csv
          from datetime import datetime
          from io import StringIO

          HEADERS = {
            'User-Agent': 'Mozilla/5.0',
            'Accept': 'application/json',
            'Referer': 'https://www.nseindia.com/',
          }

          session = requests.Session()

          # -------------------------------
          # Step 1: Cookies
          # -------------------------------
          session.get("https://www.nseindia.com", headers=HEADERS)
          time.sleep(2)

          # -------------------------------
          # Step 2: Try API (primary)
          # -------------------------------
          fno_map = {}

          print("Trying F&O API...")
          try:
              resp = session.get(
                  "https://www.nseindia.com/api/derivatives-stock",
                  headers=HEADERS,
                  timeout=10
              )

              if resp.status_code == 200:
                  data = resp.json()
                  for row in data.get("data", []):
                      sym = (row.get("underlying") or "").strip().upper()
                      lot = row.get("marketLot")
                      if sym:
                          fno_map[sym] = lot
          except Exception as e:
              print("API failed:", e)

          # -------------------------------
          # Step 3: Fallback CSV (if empty)
          # -------------------------------
          if not fno_map:
              print("Falling back to CSV...")
              try:
                  csv_resp = session.get(
                      "https://archives.nseindia.com/content/fo/fo_mktlots.csv",
                      headers={**HEADERS, "Host": "archives.nseindia.com"},
                      timeout=15
                  )

                  csv_data = StringIO(csv_resp.text)
                  reader = csv.DictReader(csv_data)

                  for row in reader:
                      sym = (row.get("SYMBOL") or "").strip().upper()
                      lot = row.get("MARKET LOT") or row.get("MARKETLOT")
                      if sym:
                          try:
                              lot = int(lot)
                          except:
                              lot = None
                          fno_map[sym] = lot

              except Exception as e:
                  print("CSV fallback failed:", e)

          print(f"F&O stocks: {len(fno_map)}")

          # -------------------------------
          # Step 4: Fetch NIFTY 500
          # -------------------------------
          resp = session.get(
              "https://www.nseindia.com/api/equity-stockIndices?index=NIFTY%20500",
              headers=HEADERS,
              timeout=15
          )

          data = resp.json()
          stocks = data.get("data", [])

          result = []

          # -------------------------------
          # Step 5: Process
          # -------------------------------
          for s in stocks:
              symbol = (s.get("symbol") or "").strip().upper()
              meta = s.get("meta", {})
              isin = meta.get("isin")
              name = meta.get("companyName")

              if not symbol or not isin or not name or "NIFTY" in symbol:
                  continue

              result.append({
                  "s": symbol,
                  "n": name,
                  "isin": isin,
                  "key": f"NSE_EQ|{isin}",
                  "hasOption": symbol in fno_map,
                  "lotSize": fno_map.get(symbol)
              })

          # -------------------------------
          # Step 6: Save
          # -------------------------------
          os.makedirs("stocks", exist_ok=True)

          with open("stocks/stocks.json", "w") as f:
              json.dump({
                  "updated_at": datetime.utcnow().isoformat(),
                  "count": len(result),
                  "fno_count": len(fno_map),
                  "data": result
              }, f, indent=2)

          print("Done")
          PYEOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@users.noreply.github.com"
          git add stocks/stocks.json
          git diff --staged --quiet || git commit -m "Update stock master"
          git push
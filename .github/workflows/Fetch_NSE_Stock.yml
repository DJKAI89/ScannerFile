name: Fetch NIFTY 500 Stock Master (Weekly + F&O Safe)

on:
  schedule:
    - cron: '0 15 * * 0'   # Sunday 8:30 PM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-stocks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Stocks + F&O (Safe)
        run: |
          python3 << 'PYEOF'
          import requests, json, time, os
          from datetime import datetime

          HEADERS = {
            'User-Agent': 'Mozilla/5.0',
            'Accept': 'application/json',
            'Referer': 'https://www.nseindia.com/',
          }

          session = requests.Session()

          # -------------------------------
          # Step 1: NSE cookies
          # -------------------------------
          print("Step 1: Getting NSE cookies...")
          try:
              session.get("https://www.nseindia.com", headers=HEADERS, timeout=10)
          except Exception as e:
              print("Cookie fetch failed:", e)
          time.sleep(2)

          # -------------------------------
          # Step 2: Fetch F&O list (SAFE)
          # -------------------------------
          print("Step 2: Fetching F&O stock list...")
          fno_url = "https://archives.nseindia.com/content/fo/fo_mktlots.csv"
          fno_set = set()

          for attempt in range(3):
              try:
                  resp = session.get(
                      fno_url,
                      headers={**HEADERS, "Host": "archives.nseindia.com"},
                      timeout=20
                  )

                  if resp.status_code == 200:
                      lines = resp.text.splitlines()
                      for row in lines[1:]:
                          parts = row.split(',')
                          if len(parts) > 1:
                              sym = parts[1].strip()
                              if sym and sym != "SYMBOL":
                                  fno_set.add(sym)
                      break
                  else:
                      print(f"F&O retry {attempt+1} status: {resp.status_code}")
                      time.sleep(2)

              except Exception as e:
                  print(f"F&O retry {attempt+1} failed:", e)
                  time.sleep(2)

          print(f"F&O stocks found: {len(fno_set)}")

          # -------------------------------
          # Step 3: Fetch NIFTY 500
          # -------------------------------
          print("Step 3: Fetching NIFTY 500 data...")
          url = "https://www.nseindia.com/api/equity-stockIndices?index=NIFTY%20500"

          for attempt in range(3):
              try:
                  resp = session.get(url, headers=HEADERS, timeout=15)
                  if resp.status_code == 200:
                      data = resp.json()
                      break
                  else:
                      print(f"NIFTY retry {attempt+1} status: {resp.status_code}")
                      time.sleep(2)
              except Exception as e:
                  print(f"NIFTY retry {attempt+1} failed:", e)
                  time.sleep(2)
          else:
              raise Exception("Failed to fetch NIFTY 500 data")

          stocks = data.get("data", [])
          result = []

          # -------------------------------
          # Step 4: Process stocks
          # -------------------------------
          for s in stocks:
              symbol = s.get("symbol")
              meta = s.get("meta", {})
              isin = meta.get("isin")
              name = meta.get("companyName")

              # Skip invalid/index rows
              if (
                  not symbol
                  or not isin
                  or not name
                  or "NIFTY" in symbol.upper()
              ):
                  continue

              result.append({
                  "s": symbol,
                  "n": name,
                  "isin": isin,
                  "key": f"NSE_EQ|{isin}",
                  "hasOption": symbol in fno_set
              })

          print(f"Valid stocks: {len(result)}")

          # -------------------------------
          # Step 5: Save JSON
          # -------------------------------
          os.makedirs("stocks", exist_ok=True)

          with open("stocks/stocks.json", "w") as f:
              json.dump({
                  "updated_at": datetime.utcnow().isoformat(),
                  "count": len(result),
                  "fno_count": len(fno_set),
                  "data": result
              }, f, indent=2)

          print("Saved stocks/stocks.json successfully")
          PYEOF

      - name: Commit & Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stocks/stocks.json
          git diff --staged --quiet || git commit -m "Auto-update: Stock master (safe + F&O)"
          git push
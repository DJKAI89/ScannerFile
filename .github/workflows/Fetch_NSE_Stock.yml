name: Fetch NIFTY 500 Stock Master (Weekly + F&O + LotSize)

on:
  schedule:
    - cron: '0 15 * * 0'   # Sunday 8:30 PM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-stocks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Fetch Stocks + F&O (Accurate)
        run: |
          python3 << 'PYEOF'
          import requests, json, time, os
          from datetime import datetime

          HEADERS = {
            'User-Agent': 'Mozilla/5.0',
            'Accept': 'application/json',
            'Referer': 'https://www.nseindia.com/',
          }

          session = requests.Session()

          # -------------------------------
          # Step 1: Get cookies
          # -------------------------------
          print("Getting NSE cookies...")
          session.get("https://www.nseindia.com", headers=HEADERS)
          time.sleep(2)

          # -------------------------------
          # Step 2: Fetch F&O stocks (BEST SOURCE)
          # -------------------------------
          print("Fetching F&O data...")
          fno_url = "https://www.nseindia.com/api/derivatives-stock"

          fno_map = {}

          for attempt in range(3):
              try:
                  resp = session.get(fno_url, headers=HEADERS, timeout=15)
                  if resp.status_code == 200:
                      data = resp.json()

                      for row in data.get("data", []):
                          sym = (row.get("underlying") or "").strip().upper()
                          lot = row.get("marketLot")

                          if sym:
                              fno_map[sym] = lot

                      break
                  else:
                      time.sleep(2)
              except:
                  time.sleep(2)

          print(f"F&O stocks found: {len(fno_map)}")

          # -------------------------------
          # Step 3: Fetch NIFTY 500
          # -------------------------------
          print("Fetching NIFTY 500...")
          url = "https://www.nseindia.com/api/equity-stockIndices?index=NIFTY%20500"

          for attempt in range(3):
              try:
                  resp = session.get(url, headers=HEADERS, timeout=15)
                  if resp.status_code == 200:
                      data = resp.json()
                      break
                  else:
                      time.sleep(2)
              except:
                  time.sleep(2)
          else:
              raise Exception("Failed to fetch NIFTY 500")

          stocks = data.get("data", [])
          result = []

          # -------------------------------
          # Step 4: Process
          # -------------------------------
          for s in stocks:
              symbol = (s.get("symbol") or "").strip().upper()
              meta = s.get("meta", {})
              isin = meta.get("isin")
              name = meta.get("companyName")

              if (
                  not symbol
                  or not isin
                  or not name
                  or "NIFTY" in symbol
              ):
                  continue

              result.append({
                  "s": symbol,
                  "n": name,
                  "isin": isin,
                  "key": f"NSE_EQ|{isin}",
                  "hasOption": symbol in fno_map,
                  "lotSize": fno_map.get(symbol)
              })

          print(f"Valid stocks: {len(result)}")

          # -------------------------------
          # Step 5: Save
          # -------------------------------
          os.makedirs("stocks", exist_ok=True)

          with open("stocks/stocks.json", "w") as f:
              json.dump({
                  "updated_at": datetime.utcnow().isoformat(),
                  "count": len(result),
                  "fno_count": len(fno_map),
                  "data": result
              }, f, indent=2)

          print("Saved stocks/stocks.json")
          PYEOF

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stocks/stocks.json
          git diff --staged --quiet || git commit -m "Update stock master with F&O + lot size"
          git push
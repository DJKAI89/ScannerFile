name: Fetch NIFTY 500 Stock Master (Weekly)

on:
  schedule:
    - cron: '0 15 * * 0'   # Sunday 8:30 PM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-stocks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Fetch NIFTY 500 stocks
        run: |
          python3 << 'PYEOF'
          import requests, json, time, os
          from datetime import datetime

          HEADERS = {
            'User-Agent': 'Mozilla/5.0',
            'Accept': 'application/json',
            'Referer': 'https://www.nseindia.com/',
          }

          session = requests.Session()

          print("Getting NSE cookies...")
          session.get("https://www.nseindia.com", headers=HEADERS)
          time.sleep(2)

          print("Fetching NIFTY 500 data...")
          url = "https://www.nseindia.com/api/equity-stockIndices?index=NIFTY%20500"
          data = session.get(url, headers=HEADERS).json()

          stocks = data.get("data", [])
          result = []

          for s in stocks:
              symbol = s.get("symbol")
              meta = s.get("meta", {})
              isin = meta.get("isin")

              if not symbol or not isin:
                  continue

              result.append({
                  "symbol": symbol,
                  "isin": isin,
                  "key": f"NSE_EQ|{isin}"   # ✅ your requirement
              })

          print(f"Total stocks: {len(result)}")

          os.makedirs("stocks", exist_ok=True)
          with open("stocks/stocks.json", "w") as f:
              json.dump({
                  "updated_at": datetime.utcnow().isoformat(),
                  "count": len(result),
                  "data": result
              }, f, indent=2)

          print("Saved stocks/stocks.json")
          PYEOF

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stocks/stocks.json
          git diff --staged --quiet || git commit -m "Update stock master (ISIN-based)"
          git push
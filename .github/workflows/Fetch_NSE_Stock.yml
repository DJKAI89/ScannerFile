name: Fetch NIFTY 500 Stock Master with sector (Weekly)

on:
  schedule:
    - cron: '30 2 * * 0'   # Sunday 8:00 AM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-stocks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Fetch stocks + merge sector
        run: |
          python3 << 'PYEOF'
          import requests, json, time, os
          from datetime import datetime

          HEADERS = {
            'User-Agent': 'Mozilla/5.0',
            'Accept': 'application/json',
            'Referer': 'https://www.nseindia.com/',
          }

          session = requests.Session()

          print("Init NSE session...")
          session.get("https://www.nseindia.com", headers=HEADERS)
          time.sleep(2)

          print("Fetching NIFTY 500...")
          url = "https://www.nseindia.com/api/equity-stockIndices?index=NIFTY%20500"
          data = session.get(url, headers=HEADERS).json()

          stocks = data.get("data", [])

          # Load sector map
          sector_map = {}
          if os.path.exists("stocks/sector_map.json"):
              try:
                  with open("stocks/sector_map.json") as f:
                      sector_map = json.load(f)
              except:
                  sector_map = {}

          result = []

          for s in stocks:
              symbol = s.get("symbol")
              meta = s.get("meta", {})
              isin = meta.get("isin")
              name = meta.get("companyName")

              if not symbol or not isin:
                  continue

              sector = sector_map.get(symbol, "Unknown")

              result.append({
                  "symbol": symbol,
                  "isin": isin,
                  "name": name,
                  "key": f"NSE_EQ|{isin}",
                  "sector": sector
              })

          print(f"Total stocks: {len(result)}")

          os.makedirs("stocks", exist_ok=True)

          with open("stocks/stocks.json", "w") as f:
              json.dump({
                  "updated_at": datetime.utcnow().isoformat(),
                  "count": len(result),
                  "data": result
              }, f, indent=2)

          print("Saved stocks/stocks.json")
          PYEOF

      - name: Debug files (optional)
        run: |
          echo "Repo structure:"
          ls -R

      - name: Commit & Push (safe)
        shell: bash
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "Checking file..."

          if [ ! -f "stocks/stocks.json" ]; then
            echo "stocks.json missing, creating fallback"
            mkdir -p stocks
            echo "{}" > stocks/stocks.json
          fi

          git add stocks/stocks.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            echo "Changes detected, committing..."
            git commit -m "Update stock master with sector"
            git push
          fi
name: Fetch NIFTY 500 Stock Master (Weekly + F&O Bulletproof)

on:
  schedule:
    - cron: '0 15 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-stocks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Fetch Stocks + F&O
        run: |
          cat << 'PYEOF' > fetch_stocks.py
          import requests, json, time, os, csv, gzip, re
          from datetime import datetime
          from io import StringIO, BytesIO

          # -----------------------------------------------
          # Step 1: NIFTY 500 from niftyindices.com
          # (public, no cookies, no NSE dependency)
          # -----------------------------------------------
          print("Fetching NIFTY 500 list from niftyindices.com...")
          nifty500_url = "https://niftyindices.com/IndexConstituents/ind_nifty500list.csv"
          resp = requests.get(
            nifty500_url,
            headers={"User-Agent": "Mozilla/5.0"},
            timeout=15
          )
          print(f"NIFTY 500 status: {resp.status_code}")

          nifty500 = []
          reader = csv.DictReader(StringIO(resp.text))
          for row in reader:
            symbol = (row.get("Symbol") or "").strip().upper()
            isin   = (row.get("ISIN Code") or "").strip()
            name   = (row.get("Company Name") or "").strip()
            if symbol and isin and name:
              nifty500.append({"s": symbol, "n": name, "isin": isin})

          print(f"NIFTY 500 stocks loaded: {len(nifty500)}")

          # -----------------------------------------------
          # Step 2: F&O list from Upstox complete instruments
          # Public CDN — no auth, no NSE cookies needed
          # -----------------------------------------------
          print("Fetching Upstox instruments for F&O map...")
          upstox_url = "https://assets.upstox.com/market-quote/instruments/exchange/complete.csv.gz"
          resp = requests.get(
            upstox_url,
            headers={"User-Agent": "Mozilla/5.0"},
            timeout=30
          )
          print(f"Upstox instruments status: {resp.status_code}")

          fno_map = {}  # symbol -> lot_size

          with gzip.open(BytesIO(resp.content), "rt", encoding="utf-8") as f:
            reader = csv.DictReader(f)
            headers = reader.fieldnames
            print(f"Instrument columns: {headers}")

            for row in reader:
              exchange = (row.get("exchange") or "").strip().upper()
              itype    = (row.get("instrument_type") or "").strip().upper()

              # Only NFO futures (one entry per underlying per expiry)
              if exchange != "NFO" or itype != "FUT":
                continue

              tradingsymbol = (row.get("tradingsymbol") or "").strip().upper()
              lot_raw       = row.get("lot_size") or "0"

              # Extract underlying symbol:
              # Upstox NFO tradingsymbol format: RELIANCE24JANFUT or RELIANCE24JAN25FUT
              # Try 'underlying_symbol' field first, then parse tradingsymbol
              underlying = (
                row.get("underlying_symbol") or
                row.get("parent_symbol") or
                ""
              ).strip().upper()

              if not underlying:
                # Parse: strip trailing DDMMMYYFUT or MMMYYFUT
                m = re.match(r'^([A-Z0-9&\-]+?)(\d{2}[A-Z]{3}\d{2}FUT|\d{2}[A-Z]{3}FUT)$', tradingsymbol)
                if m:
                  underlying = m.group(1)
                else:
                  # Last resort: strip last 9-11 chars
                  underlying = re.sub(r'\d{2}[A-Z]{3}(\d{2})?FUT$', '', tradingsymbol)

              if not underlying:
                continue

              try:
                lot = int(float(lot_raw))
              except:
                lot = None

              # Keep first (nearest expiry) lot size found
              if underlying not in fno_map:
                fno_map[underlying] = lot

          print(f"F&O symbols found: {len(fno_map)}")
          print(f"Sample F&O: {list(fno_map.items())[:10]}")

          # -----------------------------------------------
          # Step 3: Merge NIFTY 500 + F&O
          # -----------------------------------------------
          result = []
          for stock in nifty500:
            sym = stock["s"]
            has_option = sym in fno_map
            result.append({
              "s":         sym,
              "n":         stock["n"],
              "isin":      stock["isin"],
              "key":       f"NSE_EQ|{stock['isin']}",
              "hasOption": has_option,
              "lotSize":   fno_map.get(sym)
            })

          fno_count = sum(1 for r in result if r["hasOption"])
          print(f"Stocks with hasOption=True: {fno_count} / {len(result)}")

          # -----------------------------------------------
          # Step 4: Save
          # -----------------------------------------------
          os.makedirs("stocks", exist_ok=True)
          with open("stocks/stocks.json", "w") as f:
            json.dump({
              "updated_at": datetime.utcnow().isoformat(),
              "count":      len(result),
              "fno_count":  fno_count,
              "data":       result
            }, f, indent=2)

          print("Done")
          PYEOF
          python3 fetch_stocks.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@users.noreply.github.com"
          git add stocks/stocks.json
          git diff --staged --quiet || git commit -m "Update stock master"
          git push

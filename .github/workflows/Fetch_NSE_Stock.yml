name: Fetch NIFTY 500 Stock Master (Weekly + F&O)

on:
  schedule:
    - cron: '0 15 * * 0'   # Sunday 8:30 PM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-stocks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Fetch Stocks + F&O Data
        run: |
          python3 << 'PYEOF'
          import requests, json, time, os
          from datetime import datetime

          HEADERS = {
            'User-Agent': 'Mozilla/5.0',
            'Accept': 'application/json',
            'Referer': 'https://www.nseindia.com/',
          }

          session = requests.Session()

          # -------------------------------
          # Step 1: NSE cookies
          # -------------------------------
          print("Getting NSE cookies...")
          session.get("https://www.nseindia.com", headers=HEADERS)
          time.sleep(2)

          # -------------------------------
          # Step 2: Fetch F&O stock list
          # -------------------------------
          print("Fetching F&O stock list...")
          fno_url = "https://archives.nseindia.com/content/fo/fo_mktlots.csv"
          fno_text = session.get(fno_url).text.splitlines()

          fno_set = set()
          for row in fno_text[1:]:
              parts = row.split(',')
              if len(parts) > 1:
                  sym = parts[1].strip()
                  if sym:
                      fno_set.add(sym)

          print(f"Total F&O stocks: {len(fno_set)}")

          # -------------------------------
          # Step 3: Fetch NIFTY 500 stocks
          # -------------------------------
          print("Fetching NIFTY 500 data...")
          url = "https://www.nseindia.com/api/equity-stockIndices?index=NIFTY%20500"
          resp = session.get(url, headers=HEADERS, timeout=15)
          resp.raise_for_status()
          data = resp.json()

          stocks = data.get("data", [])
          result = []

          # -------------------------------
          # Step 4: Process stocks
          # -------------------------------
          for s in stocks:
              symbol = s.get("symbol")
              meta = s.get("meta", {})
              isin = meta.get("isin")
              name = meta.get("companyName")

              # Skip invalid rows (like NIFTY 500)
              if (
                  not symbol
                  or not isin
                  or not name
                  or "NIFTY" in symbol.upper()
              ):
                  continue

              result.append({
                  "s": symbol,
                  "n": name,
                  "isin": isin,
                  "key": f"NSE_EQ|{isin}",
                  "hasOption": symbol in fno_set   # 🔥 NEW FIELD
              })

          print(f"Total valid stocks: {len(result)}")

          # -------------------------------
          # Step 5: Save JSON
          # -------------------------------
          os.makedirs("stocks", exist_ok=True)

          with open("stocks/stocks.json", "w") as f:
              json.dump({
                  "updated_at": datetime.utcnow().isoformat(),
                  "count": len(result),
                  "fno_count": len(fno_set),
                  "data": result
              }, f, indent=2)

          print("Saved stocks/stocks.json successfully")
          PYEOF

      - name: Commit & Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stocks/stocks.json
          git diff --staged --quiet || git commit -m "Auto-update: Stock master with F&O flag"
          git push